[build]
builder = "NIXPACKS"
buildCommand = "cd frontend && npm install && npm run build && cd .. && cargo build --release --manifest-path backend/Cargo.toml"

[deploy]
startCommand = "./backend/target/release/server"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
